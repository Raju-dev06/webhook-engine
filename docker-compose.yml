services:
  mysql:
    image: mysql:8.0
    container_name: webhook_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: webhook_engine
      MYSQL_USER: webhook
      MYSQL_PASSWORD: webhookpassword
    ports:
      - "3308:3306"
    volumes:
      - ./src/main/resources/db/init:/docker-entrypoint-initdb.d
      - mysql_data:/var/lib/mysql
    networks:
      - webhook_network
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: webhook_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - webhook_network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 30s
      retries: 3

volumes:
  mysql_data:
  rabbitmq_data:

networks:
  webhook_network:
    driver: bridge
